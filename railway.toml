[build]
  command = "cd frontend && npm ci && npm run build && cd ../backend && pip install -r requirements.txt"

[build.environment]
  PYTHON_VERSION = "3.11.0"
  NODE_VERSION = "20"

[[services]]
  name = "cross-board-normalization"
  module = "backend/app/main:app"
  start = "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
