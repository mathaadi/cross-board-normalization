# Docker Compose — PostgreSQL + Redis + App
# Usage: cd docker && docker-compose up --build

version: "3.9"

services:
  # ── PostgreSQL Database ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: normalization-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: normalization_user
      POSTGRES_PASSWORD: normalization_pass
      POSTGRES_DB: normalization_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U normalization_user -d normalization_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: normalization-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application (Backend + Frontend) ─────────────────────────────
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: normalization-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://normalization_user:normalization_pass@postgres:5432/normalization_db
      REDIS_URL: redis://redis:6379/0
      CACHE_TTL_SECONDS: 3600
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
